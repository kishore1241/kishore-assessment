<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Engineering Assessment Prototype</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --panel: #ffffff;
        --ink: #0f172a;
        --muted: #475569;
        --brand: #0f766e;
        --accent: #be123c;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top right, #dbeafe 0%, var(--bg) 42%);
        color: var(--ink);
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
      }
      .panel {
        background: var(--panel);
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 16px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      textarea,
      input,
      button {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        margin-top: 8px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
      }
      button {
        background: var(--brand);
        color: #fff;
        border: none;
        cursor: pointer;
        font-weight: 600;
      }
      .muted {
        color: var(--muted);
      }
      pre {
        white-space: pre-wrap;
        background: #0b1020;
        color: #d1fae5;
        border-radius: 8px;
        padding: 10px;
      }
      .warn {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>AI Engineering Assessment Prototype</h1>
        <p class="muted">Engineer-led requirement analysis and URL shortener demo in an isolated workspace.</p>
      </section>

      <section class="panel">
        <h2>Analyze Requirement</h2>
        <textarea id="requirement" rows="4">Build a scalable URL shortener service with APIs, persistence, and analytics.</textarea>
        <button id="analyzeBtn">Analyze</button>
        <pre id="analysisOutput">No analysis yet.</pre>
      </section>

      <section class="panel">
        <h2>Create Short URL</h2>
        <input id="originalUrl" value="https://example.com/docs" />
        <input id="customCode" placeholder="optional custom code" />
        <button id="shortenBtn">Create Short URL</button>
        <pre id="shortenOutput">No short URL created yet.</pre>
        <p class="warn">Tip: open /s/{code} to test redirect and analytics increment.</p>
      </section>
    </main>

    <script>
      const analyzeBtn = document.getElementById("analyzeBtn");
      const requirement = document.getElementById("requirement");
      const analysisOutput = document.getElementById("analysisOutput");
      const shortenBtn = document.getElementById("shortenBtn");
      const originalUrl = document.getElementById("originalUrl");
      const customCode = document.getElementById("customCode");
      const shortenOutput = document.getElementById("shortenOutput");

      analyzeBtn.addEventListener("click", async () => {
        const response = await fetch("/api/assessment/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ requirement: requirement.value })
        });
        const payload = await response.json();
        analysisOutput.textContent = JSON.stringify(payload, null, 2);
      });

      shortenBtn.addEventListener("click", async () => {
        const body = { originalUrl: originalUrl.value };
        if (customCode.value.trim()) body.customCode = customCode.value.trim();

        const response = await fetch("/api/short-urls", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const payload = await response.json();
        shortenOutput.textContent = JSON.stringify(payload, null, 2);
      });
    </script>
  </body>
</html>
